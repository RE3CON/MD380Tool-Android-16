name: 1. Generate Keystore (Run Once)

on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "password123" -keypass "password123" -dname "CN=My App, OU=App, O=My Company, L=City, S=State, C=US"
          base64 release.keystore > keystore_base64.txt
          
      - name: Upload Keystore Base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64-text
          path: keystore_base64.txt
