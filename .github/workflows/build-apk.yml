name: Build Android Release APK

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code (Integer, e.g., 1)'
        required: true
        default: '1'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Sync Capacitor Android
      run: |
        if [ ! -d "android" ]; then
          npx @capacitor/cli add android
        else
          npx @capacitor/cli sync android
        fi

    - name: Update Android Version
      # Automatically updates the version in build.gradle based on your input
      run: |
        sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/g" android/app/build.gradle
        sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version_name }}\"/g" android/app/build.gradle

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MD380Tool-Release-v${{ github.event.inputs.version_name }}
        path: ${{steps.sign_app.outputs.signedReleaseFile}}
        retention-days: 14
